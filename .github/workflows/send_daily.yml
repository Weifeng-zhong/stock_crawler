name: 每日收盘数据推送

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      verify_email:
        description: '验证邮箱地址'
        required: false
        type: string

env:
  VERIFY_EMAIL: ${{ github.event.inputs.verify_email || '' }}

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 获取数据并发送邮件
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
        run: |
          if [ -n "$VERIFY_EMAIL" ]; then
            python daily_fetch.py --verify-email "$VERIFY_EMAIL"
          else
            python daily_fetch.py
          fi
