name: 每日收盘数据推送

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      verify_email:
        description: '验证邮箱地址'
        required: false
        type: string

permissions:
  contents: write

env:
  VERIFY_EMAIL: ${{ github.event.inputs.verify_email || '' }}

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 获取数据并发送邮件
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
        run: |
          if [ -n "$VERIFY_EMAIL" ]; then
            python daily_fetch.py --verify-email "$VERIFY_EMAIL"
          else
            python daily_fetch.py
          fi

      - name: 提交 last_sent_date 到仓库
        if: ${{ env.VERIFY_EMAIL == '' }}
        run: |
          git config user.name "stock-bot"
          git config user.email "bot@users.noreply.github.com"
          git add config.json
          git diff --quiet && git diff --staged --quiet || git commit -m "update last_sent_date"
          git push
